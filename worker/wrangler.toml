name = "jit-llm-proxy"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_KV"
id = "d031653a048e48a79299a063f4f5b160"           # `wrangler kv namespace create RATE_KV`

# Secrets (set via `wrangler secret put`):
#   LLM_API_KEY    — your SiliconFlow / other provider API key
#   SIGN_KEY       — must match _SIGN_KEY in jitx/llm.py
